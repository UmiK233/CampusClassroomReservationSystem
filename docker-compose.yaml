version: '3'

services:
  db:
    image: mysql:8
    container_name: my-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: classroom
    volumes:
      # 将本地的SQL文件挂载到容器中，MySQL会在启动时自动执行该文件来初始化数据库
      - ./backend/sql/classroom.sql:/docker-entrypoint-initdb.d/init.sql
      # 持久化数据到本地目录
      - db-data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: my-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/classroom
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      JWT_SECRET: a-very-secret-key-that-should-be-changed-in-production
      JWT_EXPIRATION: 86400000

  # 前端不需要单独服务 直接让 Nginx托管静态文件
  nginx:
    build: ./frontend
    container_name: my-nginx
    ports:
      - "80:80"
    # 将本地的Nginx配置挂载到容器的Nginx配置中,不然还得进容器内修改配置文件
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

# Docker会创建一个虚拟卷db-data来持久化MySQL的数据，这样即使容器被删除，数据也不会丢失。
volumes:
  db-data:
