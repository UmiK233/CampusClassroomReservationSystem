version: '3'

services:
  db:
    image: mysql:8
    container_name: my-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: classroom
    volumes:
      - ./backend/sql/classroom.sql:/docker-entrypoint-initdb.d/init.sql
      - db-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: my-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: my-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/classroom
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.qq.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-465}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-your-email@example.com}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-your-app-password}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:-true}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-your-email@example.com}
      APP_AUTH_EMAIL_CODE_EXPIRATION_SECONDS: 300
      APP_AUTH_EMAIL_CODE_RESEND_SECONDS: 60
      JWT_SECRET: a-very-secret-key-that-should-be-changed-in-production
      JWT_ACCESS_EXPIRATION: 1800000
      JWT_REFRESH_EXPIRATION: 604800000

  nginx:
    build: ./frontend
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  db-data:
